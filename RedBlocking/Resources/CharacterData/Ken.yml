introduction:
  displayTitle: "【炎の昇龍】"
  body: |-
    格闘大会参加に向けて意気込むショーンを尻目に、ケンはため息ををつく。
    久しく骨のある相手と戦ってない。このままでは腕も鈍るばかりだ。
    そんな折、「謎の組織」の噂が彼の耳に届く。
    忘れかけていた、身を焼く危険の匂い。ケンの瞳に熱い炎が戻ってきた。
