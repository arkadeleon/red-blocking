  displayName: Gouki
introduction:
  displayTitle: "【拳を極めし者】"
  body: |-
    「拳を極めし者」……豪鬼。凶凶しくも純粋な「闘い」への執念。
    その背に幾万もの亡者を背負い、次の強者を求め黄泉と現世(うつしょ)の狭間をさまよう。
    「我が拳……誰ぞ破らん!」
    今宵もまた、哀しく鬼が戦慄(わなな)く。
