introduction:
  displayTitle: "【拳闘紳士】"
  body: |-
    チャンピオンタイトルに返り咲き、みごと「サー」の特別称号を授かったダッドリー。
    王室からの招待により、御前試合を披露する事になった。
    「より完璧かつドラマティックな試合をせねば…」
    まだ日はある。世界をまわり、さらなるレベルアップを図るに十分な時間が。
