      noteGroups:
      - id: item_cf8aa5b927
        displayTitle: 補足
        entries:
        - "・コマンド完成後、暗転50フレーム、相手行動不能時間50フレーム。コマンド完成から54フレーム間無敵 \n・攻撃発生12フレーム前に無敵終了。食らい判定出現(技を重ねられていたら潰されるが、SAは発動する) \n・発動後、攻撃力1/4の分身が2体付く\n・分身の削減値は、本体の出した技と同じ削減値\n・分身は飛び道具扱いのため、全ての攻撃が両方ガード可能。また分身の攻撃をガードされていても本体は行動可能\n・本体の攻撃をBLされない限り時間停止が無い\n・ケズる事が出来るのは本体の攻撃のみ\n・旧基板ではガード不能連係を組むことが可能。 詳しい事はこちらでどうぞ\n\n【星影演舞中の技属性付加】\n星影円舞中は直前に空振りした分身の攻撃の技属性を付加することができる。 ただし付加された属性の効果が確認できるのは近中Kなど(星影の終わり際は除く)。\n星影発動中には特に恩恵は無いが、星影終了間際に付加することでさまざまな追撃を決めることができるようになる。\n手順は以下の通り。\n　1.星影発動中に分身の攻撃を空振りする\n　2.星影の終わり際に分身の攻撃をヒットさせる\n　3.分身の攻撃が出ている間に星影が終了すると、空振りした技の属性が付加される\nなお、快ホウを除き、空振りしたあとに別の技を出すと付加された属性は消えるので要注意。\n付加される技属性はのけぞり・吹き飛び・ダウンなどで、ダメージ、スタン値、中下段判定、BL属性は付加されない。また終わり際に当てる攻撃は打撃技であれば特に制限が無い。\nまた一部のキャラは屈大Ｋや蟷螂斬の3段目のダウン属性を付加した雷撃蹴でダウンを奪った後、前方転身で投げることが可能。\nおすすめの付加属性は、浮きが高く追撃が可能な穿弓腿。　穿弓腿属性付加技がヒット後、画面端ならば\n　1：近中K→白虎双掌打→遠大P\n　2：（大蟷螂斬1段目→小蟷螂斬2段目)×2→遠大P\nなどで追撃することができる。　「１」は6中Kや屈中Kから、「2」は屈中Kからコンボにする事ができる。\n利点は補正がかからないので、ダメージ、ゲージ回収率がアップする点。　欠点は星影中のダメージが減少する点。　しかしその後の流れが有利になる可能性が高いため狙う価値はある。"
      media:
        kind: motion_player
        displayLabel: モーション
        skillName: Sei-ei Enbu
        characterCode: '10'
        skillCode: '047'
