introduction:
  displayTitle: "【若き双龍】"
  body: |-
    街の平和を守るのは誇りある仕事だ。当然、「謎の組織」なるものの勝手を許してはおけない。
    兄のユンも使命感に燃えている。
    「まあ、今回も俺にまかせとけ。」
    得意げなユンに、ヤンは心中でつぶやく。
    「いつまでも頼りっぱなしじゃないぜ。見てろよ、兄貴!」
