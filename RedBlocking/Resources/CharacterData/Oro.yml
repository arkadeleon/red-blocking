character:
  id: oro
  displayName: Oro
introduction:
  displayTitle: "【仙術の怪老】"
  body: |-
    「……暇じゃの～」オロの退屈は極限に達していた。
    若手ファイターを勝手に弟子入りさせてもみるが、どいつも長続きしない。
    ある日、たまたま興味をひく俗世の噂が耳に入った。
    「謎の組織に、拳を極めし者か……ま、それなりには遊べるじゃろ」
