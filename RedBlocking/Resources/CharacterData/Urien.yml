        entries:
        - "・コマンド完成後、暗転50フレーム、相手行動不能時間54フレーム。コマンド完成から47フレーム間無敵 \n・暗転無敵終了3フレーム前に無敵終了。食らい判定出現(技を重ねられていたら潰される) \n・発生の数値はエイジスが出るまでのフレーム\n・上エイジスのみSAコマンド完成後の暗転を見てからのBLやガードはできない(暗転直後4フレーム間の入力での先行BLは可能)\n・各キャラの全ての動作の最終フレームは、上エイジスだけガードできる。よって上エイジスはヒット&ガード硬直時間差で+1フレームの場合には当てる事が出来るが、-1フレーム技の隙には反撃できない\n・相手と同時にSAを入力して上エイジスが先に暗転した場合、相手には暗転させない\n・小(上)→中→大の順に発生場所が自キャラを起点に遠くへ移動\n　　小：自身の目の前に出現し、少し前方へ移動\n　　中：やや遠方に出現。移動はしない\n　　大：遠くに出現後、手前へ少し移動\n　　上：前方斜め上に出現。移動無し。発生が0Fなので対空として使用可能\n・相手に触れなかった場合、約3.5秒その場で停滞して消滅\n・相手に触れた場合、6回ガードもしくは6ヒットしたら消滅\n・飛び道具を跳ね返す事が可能。ただし電刃波動拳、ギルの飛び道具は跳ね返せないので要注意\n・旧基板であれば挟み込んでガード不能連係が可能"
