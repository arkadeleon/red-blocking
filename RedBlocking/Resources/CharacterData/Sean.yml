        - id: ex
          displayTitle: EX
          entries:
          - |-
            ・攻撃力欄のカッコ内の数値は技の後半部分のもの
            ・コマンド完成後、8フレーム間完全無敵。9フレーム目(攻撃発生時)肩より上打撃無敵。10フレーム目から空中判定に移行
