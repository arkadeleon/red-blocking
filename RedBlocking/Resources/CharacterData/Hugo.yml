- id: super_arts
  displayTitle: "【スーパーアーツ】"
  entries:
  - id: item_4b876104c5
    displayName: ギガスブリーカー
    detail:
      displayName: ギガスブリーカー
      command: レバー2回転+P
      guard: "×"
      blocking: "×"
      startup: '0'
      active: '2'
      recovery: 36(28)
      damage: '630'
      chipDamage: "―"
      stun: '7'
      stunReduction: "―"
      frameAdvantage:
        guard: "―"
        standingHit: ダウン
        crouchingHit: ダウン
      stats:
        ストック数: １
        ゲージの長さ: 128ドット
        投げ間合い: '70'
      noteGroups:
      - id: item_cf8aa5b927
        displayTitle: 補足
        entries:
        - "・コマンド完成後、暗転50フレーム、相手行動不能時間54フレーム。コマンド完成から56フレーム間無敵 \n・つかみ判定発生まで完全無敵。つかみ判定発生から2フレーム打撃無敵 \n・SAコマンド完成後の、暗転直後4フレーム間の先行ジャンプ入力でも回避できない。当然、暗転後のジャンプでも回避できない\n・相手と同時にSAを入力してギガスが先に暗転した場合、相手には暗転させない\n・コマンドは2回転となっているが、1回転半で出す事が可能\n・硬直欄のカッコ内の数値はしゃがみ状態で着地した時のもの\n\n【立ちギガス】\nヒューゴーはハイジャンプの出掛かりモーションが長いため、素早くレバーを回せばハイジャンプキャンセルを利用してジャンプするまでにコマンド入力が間に合うというテクニック。\n上手く出来ない人は、入力の際にレバーをニュートラルから回し始めるよう意識する事。\nとにかく肩がはずれるくらい速くまわせば、誰でも「出すこと」は出来る(笑)\n\n【空振りギガス】\n相手のBL仕込み空ジャンプや、相手の起き上がりに当てないように技を空振りして、その間にギガスコマンドを完成させるテクニック。\n飛込みに対しては立小Kや屈小K、起き上がりには立中Pやリープ、投げスカリなどを空振りさせてから仕込んでおくとやりやすい。\n\n【分割ギガス】\nギガスコマンドの受付時間が長いのを利用して、何らかの技を出して(ガードさせて)る最中に予め1回転させた後、少し歩いて残りの半回転で出すというテクニック。 ギガス受付タイマーを最大限に利用した場合、かなりの距離を歩くことが出来る。"
      media:
        kind: motion_player
        displayLabel: モーション
        skillName: Gigas Breaker
        characterCode: '06'
        skillCode: '044'
