character:
  id: hugo
  displayName: Hugo
introduction:
  displayTitle: "【熱血の大巨人】"
  body: |-
    前トーナメントでの圧勝ぶりがたたり、誰もがヒューゴーを敬遠するようになった。
    試合を組めない日々にマネージャーのポイズンはたまりかね「新軍団の設立&強者スカウト」を案じる。
    もう弱腰どもに愛想は尽きた。強者よ集え、弱虫は去れ。
    彼らの新たなチャレンジが始まった。
