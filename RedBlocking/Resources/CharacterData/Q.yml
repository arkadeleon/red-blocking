          - "・投げ無敵になるのは、レバーをニュートラルにして8フレーム目から。ただし、投げ無敵はニュートラル状態でないと発動しない\n・投げ無敵状態は8フレーム間持続\n・攻撃、移動など、少しでも他の行動をすると無敵状態は解除される\n・投げ無敵中は見た目は立ちモーションだが、しゃがみ食らい扱いなので注意 \n・しゃがみ状態を経由したニュートラル立ちモーション自体に投げ無敵があるため、ダウンからの起き上がりの場合は投げ無敵はつかない\n・ガード状態からでも、下BL後からでも投げ無敵を狙える。特に下BL後は自動的にニュートラルでの受付時間延長状態になり、投げと下段に対して勝てる状況になる\n・この現象はQの投げられ判定がバグにより8フレーム間、空中判定になるために起こる。よって屈伸投げ抜け中はメガトンプレス、鬼神力の空中投げ、通常空中投げ、で投げることが可能（以下の動画を参照）\n・モーション表の青色の部分は食らい判定を、オレンジ色の部分は投げられ判定を表示"
