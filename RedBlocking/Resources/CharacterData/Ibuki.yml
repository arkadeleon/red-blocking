introduction:
  displayTitle: "【高校生忍者】"
  body: |-
    高校卒業を間近に控えたいぶき。学校推薦の就職ではなく、一般大学への進学を強く希望する。
    そのためには厳しい卒業試験にパスしなければならない。
    新しい出会いと甘い恋が待っている、そう思うだけで苦無磨きに力がこもる。
    「絶対、素敵な彼氏とキャンパスライフを楽しむんだから!」
