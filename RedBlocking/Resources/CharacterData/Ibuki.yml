          entries:
          - "・硬直欄のカッコ内の数値はしゃがみ状態で着地した時のもの\n・SCは1、2段目もできるが、対応SAのゲージが無いため実質出来ず、3段目以降がSA1でのみSC可能\n・ヒットしてもダウンしない\n・ヒット時のみ、斜めジャンプと同様の技が出せる。ただし空中BLはできない。なお霞朱雀のみヒット、ガード、空振りを問わず出せる。 \n・コマンド完成後5フレーム間、完全無敵。6フレーム目のみ腰から上のみ打撃無敵。7フレーム目から空中判定に移行"
