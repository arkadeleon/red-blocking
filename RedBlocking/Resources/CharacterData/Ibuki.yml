          entries:
          - "・硬直欄のカッコ内の数値はしゃがみ状態で着地した時のもの\n・攻撃力とスタン値欄のカッコ内の数値はカス当たり時のもの\n・SCは小、中、大ともに1、2段目がSA2と3で、3段目以降がSA1でのみSC可能\n・小と中は1、2段が大は3段目までが強制立たせ技で、3段目(大は4段目)がダウン属性になっている\n・小はコマンド完成後、6フレーム目から投げられ判定が空中になる。ただし打撃は地上で食らう。7フレーム目から空中判定に移行 \n・中はコマンド完成後、8フレーム間、胸より上のみ打撃無敵。9フレーム目から空中判定に移行 \n・大はコマンド完成後、10フレーム間、腰から上のみ打撃無敵。11フレーム目から空中判定に移行"
        - id: ex
