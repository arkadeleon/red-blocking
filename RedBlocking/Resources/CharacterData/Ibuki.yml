          entries:
          - 硬直欄のカッコ内の数値はガードされた時のもの
        - id: item_922517cc73
          displayTitle: 小
          entries:
          - |-
            ・レバーを下に入れることで2段目を下段に派生する事が可能
            ・小攻撃キャンセルからでは繋がらない
        - id: item_0869071c92
          displayTitle: 中
          entries:
          - |-
            ・2段目の判定が出ている間に中Kボタンを押す事で3段目を出す事が可能
            ・2段目の判定が出ている間に中Kボタンを押し、レバー下に入れることで3段目を下段に派生する事が可能
            ・3段目を出す時はヒット確認して出す。また、しゃがみヒット時は3段目を下段にしても繋がる
        - id: item_0889c34972
          displayTitle: 大
          entries:
          - |-
            ・レバーを下に入れることで3段目を下段に派生する事が可能
            ・大攻撃キャンセルからでないと繋がらない。ただし屈ヒット時は中攻撃からでも繋がる
            ・2段目のみSC可能。キャンセル猶予時間は17～24フレーム
            ・3段目の上段はしゃがみ状態の春麗、エレナ、オロにヒットしない
        - id: ex
          displayTitle: EX
          entries:
          - |-
            ・レバーを下に入れることで2段目以降を下段に派生させる事が可能。この場合2、3段目の下段ではダウンしない
            ・上段から下段に派生すると繋がらない。下段から上段なら繋がる｡ なおしゃがみヒットならどちらからでも繋ぐことが可能
            ・上段、下段ともに4段目のみダウン属性あり
            ・SCできるが、システムディレクションをいじらない限り、繋がるSAがない
