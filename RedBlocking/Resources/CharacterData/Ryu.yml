          entries:
          - "・コマンド完成後、7フレーム目から空中判定に移行\n・削減値欄の「1」は前方にでる攻撃判定のもの。後方に出る判定は「3」。ただし後方の判定は二回出るが2ヒットしない \n・吸い込み効果あり\n・画面端でヒット時、真空波動拳で追撃可能。キャラ限定で昇龍拳でも追撃可能。詳しくは下の表を参照。"
