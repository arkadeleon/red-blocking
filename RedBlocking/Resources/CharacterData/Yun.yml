character:
  id: yun
  displayName: Yun
introduction:
  displayTitle: "【若き双龍】"
  body: |-
    人々の生きる力が心地よい緊張感とともに満ちている街、香港。
    その平和を脅かす謎の組織の存在に気づいたユンたちは、先手を打って組織の深部に乗り込む事を決意した。
    避けられない闘いを前にユンの鼓動は高鳴る。
    「俺たちの街、守ってみせる!!」
