            Rows:
              - RowTitle: "・コマンド完成後、暗転50フレーム、相手行動不能時間64フレーム。コマンド完成から67フレーム間無敵 \n・攻撃発生7フレーム前に無敵終了。食らい判定出現(技を重ねられていたら潰されるが、幻影陣は発動する) \n・攻撃力が低下し、攻撃動作がすべて高速化、全ての技にSA判定、キャンセル可能、空中コンボ判定&空中ヒット時にダウン属性、削減値リセットがつく\n・鉄山靠が2ヒット、絶招歩法が3ヒット技に変化\n・地上TCの屈大K→立大Kと、近(遠)立中P→立大P→4大Pが使用不可になる\n・技を途中で切ってもダメージ補正が「0」にならない\n\n【移動虎撲子】\n幻影ユンでの上級テクニックで、「立小Kを2フレーム以内に空キャンセルして虎撲子を出す事」で成立するテクニック。\n入力方法は\n　1.レバーを2146と入力\n　2.(幻影陣中の)立小Kを出す\n　3.スライド入力でPボタンを押し、立小Kを空キャンセルし、虎撲子を当てる\n　4.2146と入力するのは最後の4入力で後ろに下がってしまう可能性を防ぐため。もちろん214入力でも可能\nまた移動虎撲子はレバー部分の先行入力が出来るため、幻影コンボの最中に『6中K→（6中Kヒット中に）214とレバー入力→着地と同時に小KとPずらし押し』と入力する事でスムーズに移動虎撲子を出すことが可能。\n\n【超移動虎撲子】\n幻影ユンでの上級テクニックで、「遠立中Pを7フレーム以内にキャンセルして立小Kを出し、さらに立小Kを2フレーム以内に空キャンセルして虎撲子を出す事」で成立するテクニック。\nなお初段の遠立中Pは通常の空キャンセルではなく、レバー入力で遠立中Pをキャンセルしている点に注意。 \n幻影陣中の『虎撲子→虎撲子』、『遠立大P→虎撲子』、『打開→虎撲子』などの繋ぎが可能になる。\nまた、『虎撲子→虎撲子』部分はしっかりと間を空けないと、虎撲子のヒットバックと超移動部分がカチ合ってしまい、その場合にはノックバックを優先するため全く移動しなくなるので要注意。\n入力方法は\n　1.遠立中Pを空振りする\n　2.移動している間にレバーを214と入力\n　3.遠立中Pを空キャンセルして、(幻影陣中の)立小Kを出す\n　4.スライド入力でPボタンを押し、立小Kを空キャンセルし、移動虎撲子を当てる\n　5.まとめると、（幻影陣中に）遠立中P→（１～7以内に）レバーを2に入力→レバーを1、4と入力して小KとPをずらし押し、となる"
