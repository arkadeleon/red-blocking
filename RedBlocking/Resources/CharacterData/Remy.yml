introduction:
  displayTitle: "【愛と憎しみの狭間で】"
  body: |-
    許せない奴等がいる。倒せ、潰せと心が吠える。
    銀髪に隠された瞳が一瞬の狂気に煌くとき、青年の心は闇に染まる。
    復讐の宴…。もう後には引けないのだ。
