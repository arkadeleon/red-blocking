      displayTitle: 補足
      entries:
      - "・硬直欄のカッコ内の数値はヒット時のもの\n・連打によりヒット数が変化。最大で中は3ヒット、大は5ヒットする\n・BLされた場合、小は連打をやめるまで、中・大は最大10回まで攻撃判定がループする\n・連打しなくても相手にヒットおよびガードされた時にボタン押しっぱなしで連打と同じ効果になる \n・中は2ヒット以上、大は3ヒット以上しないとダウンしない\n・コマンド完成後、半キャラほど前に出る。攻撃判定終了後は元の位置に戻るため反撃の間合いに注意\n・主に小、中はめくりにも対応した対空に、大は連続技に使用する\n・キャンセル猶予時間は\n　小電磁：23フレーム \n　中電磁：1段目が18フレーム、２段目が19～36フレーム\n　大電磁：1段目が18フレーム、２段目が19～36フレーム、3段目が37～54フレーム"
